<!DOCTYPE html>
<html lang="hu">
<head>
 <meta charset="UTF-8">
 <title>TV Wallboard Élő Adás</title>
 <style>
 body { background-color: #0f172a; color: #f8fafc; font-family: 'Segoe UI', sansserif; margin: 0; padding: 30px; overflow: hidden; }
 h2 { color: #38bdf8; margin-top: 0; font-size: 24pt; border: none; padding: 0;
text-transform: uppercase; letter-spacing: 1px; }
 #wallboard { display: flex; flex-direction: column; gap: 20px; max-height: 85vh;
overflow: hidden; }
 .message-card {
 background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
 border-left: 8px solid #38bdf8;
 padding: 25px;
 border-radius: 12px;
 box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
 animation: slideIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
 }
 .sender { font-weight: bold; color: #f43f5e; font-size: 16pt; margin-bottom:
8px; }
 .time { font-size: 11pt; color: #94a3b8; font-weight: normal; float: right; }
 .content { font-size: 20pt; line-height: 1.4; color: #e2e8f0; }
 @keyframes slideIn {
 from { opacity: 0; transform: translateX(50px); }
 to { opacity: 1; transform: translateX(0); }
 }
 </style>
</head>
<body>
 <h2>Élő üzenőfal <span style="color:#f43f5e;">●</span></h2>
 <div id="wallboard"></div>
 <script type="module">
 import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebaseapp.js";
 import { getFirestore, collection, query, where, orderBy, onSnapshot } from
"https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";
 const firebaseConfig = {
 apiKey: "AIzaSyDS6UEeb9o5XT7hCBOHMw-nADQkQrEXRIk",
 authDomain: "ootv-9ad58.firebaseapp.com",
 projectId: "ootv-9ad58"
 };
 const app = initializeApp(firebaseConfig);
 const db = getFirestore(app);
 const q = query(collection(db, "messages"), where("approved", "==", true),
orderBy("timestamp", "desc"));
 onSnapshot(q, (snapshot) => {
 const wallboard = document.getElementById('wallboard');
 wallboard.innerHTML = "";
 snapshot.forEach((doc) => {
 const data = doc.data();
 wallboard.innerHTML += `
 <div class="message-card">
 <div class="sender">${data.name} ${data.date}</div>
 <div class="content">"${data.text}"</div>
 </div>
 `;
 });
 });
 </script>
</body>
</html>
